name: Publicar Normando para Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Conferir versão da tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $version) {
            throw "A tag v$tag não corresponde à versão $version do package.json."
          }

      - name: Instalar dependências
        run: npm ci

      - name: Gerar instalador e publicar Release
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
