name: Publicar Normando para Windows

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Conferir versão da tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          if ($tag -ne $version) {
            throw "A tag v$tag não corresponde à versão $version do package.json."
          }

      - name: Instalar dependências
        run: npm ci

      - name: Preparar conexão padrão com o Railway
        shell: pwsh
        env:
          NORMANDO_RAILWAY_URL: ${{ vars.NORMANDO_RAILWAY_URL || 'https://legislator-production.up.railway.app' }}
          NORMANDO_RAILWAY_API_KEY: ${{ secrets.NORMANDO_RAILWAY_API_KEY }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:NORMANDO_RAILWAY_URL)) {
            throw "Configure a variável NORMANDO_RAILWAY_URL no repositório."
          }
          if ([string]::IsNullOrWhiteSpace($env:NORMANDO_RAILWAY_API_KEY)) {
            throw "Configure o secret NORMANDO_RAILWAY_API_KEY no repositório."
          }
          $config = @{
            url = $env:NORMANDO_RAILWAY_URL
            chave = $env:NORMANDO_RAILWAY_API_KEY
            modo = "railway"
          } | ConvertTo-Json
          [IO.File]::WriteAllText(
            (Join-Path $PWD "build/railway-default.json"),
            $config,
            [Text.UTF8Encoding]::new($false)
          )

      - name: Gerar instalador e publicar Release
        run: npm run release:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
