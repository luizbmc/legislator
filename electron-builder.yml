appId: br.gov.legislator
productName: Normando
copyright: Copyright © 2025

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

win:
  target: nsis
  icon: build/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages: [pt_BR]

mac:
  target: dmg
  icon: build/icon.icns

linux:
  target: AppImage
  icon: build/icon.png

# Rebuilda módulos nativos (better-sqlite3) para a versão do Electron
npmRebuild: true
