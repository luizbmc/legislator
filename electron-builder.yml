appId: br.gov.legislator
productName: Normando
copyright: Copyright © 2026

directories:
  buildResources: build
  output: dist

files:
  - out/**/*
  - node_modules/**/*
  - "!node_modules/.cache"

publish:
  provider: github
  owner: luizbmc
  repo: legislator
  releaseType: release

win:
  target: nsis
  icon: build/icon.png
  artifactName: Normando-Setup-${version}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerLanguages: [pt_BR]
  createDesktopShortcut: always
  createStartMenuShortcut: true
  shortcutName: Normando

mac:
  target: dmg
  icon: build/icon.png

linux:
  target: AppImage
  icon: build/icon.png

# Rebuilda módulos nativos (better-sqlite3) para a versão do Electron
npmRebuild: true
